name: F-Droid CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/build.gradle'
      - 'gradle.properties'
      - 'repo/metadata/*.yml'
      - '.github/workflows/fdroid-ci.yml'
  pull_request:
    branches:
      - main

jobs:
  fdroid-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Make fdroid/repo directory
      run: mkdir -p fdroid/repo
    
    - name: Build release APK
      run: ./gradlew :app:assembleRelease
    
    - name: Copy APK to fdroid/repo
      run: cp ./app/build/outputs/apk/release/app-release-unsigned.apk ./fdroid/repo/
    
    - name: Verify APK
      run: ls -lh ./fdroid/repo/*.apk
    
    - name: Create Git commit for F-Droid repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add fdroid/repo/
        git commit -m "F-Droid: Update APK for new version $(cat gradle.properties | grep APP_VERSION_MINOR | cut -d= -f2 | rev | cut -d. -f1)" || echo "No changes to commit"
    
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}