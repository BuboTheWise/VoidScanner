# F-Droid Build and Update

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'fdroid/**'
      - 'app/build.gradle'
      - 'gradle.properties'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version'
        required: true
        default: '1.1.06'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python for fdroidserver
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install fdroidserver
      run: pip install fdroidserver

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build release APK
      run: ./gradlew assembleRelease

    - name: Version info
      id: version
      run: |
        APP_VERSION_NAME=$(grep 'APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)
        APP_VERSION_CODE=$(grep 'APP_VERSION_CODE=' gradle.properties | cut -d'=' -f2)
        echo "app_version=$APP_VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$APP_VERSION_CODE" >> $GITHUB_OUTPUT
        echo "apk_name=void-scanner-$APP_VERSION_NAME.apk" >> $GITHUB_OUTPUT
        echo "Version: $APP_VERSION_NAME ($APP_VERSION_CODE)"

    - name: Copy APK to fdroid/repo (manual repo - no signing needed)
      run: |
        APK_NAME=${{ steps.version.outputs.apk_name }}
        echo "Copying APK: $APK_NAME"
        cp app/build/outputs/apk/release/app-release.apk fdroid/repo/$APK_NAME

    # Note: No fdroid update needed - this is a manual repository served via GitHub Pages
    # F-Droid client will auto-detect APK from repo URL

    - name: Verify APK is in repo
      run: |
        echo "Contents of fdroid/repo:"
        ls -lah fdroid/repo/*.apk || echo "No APK found in repo"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: void-scanner-apk
        path: fdroid/repo/*.apk
        retention-days: 7

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: fdroid/repo

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git add fdroid/repo/metadata/
        git add fdroid/repo/*.apk
        git add fdroid/repo/index.xml
        git diff --quiet && git diff --staged --quiet || git commit -m "F-Droid: Update APK and index"
        git push origin main

  verify:
    needs: build-and-update
    runs-on: ubuntu-latest
    steps:
    - name: Verify repository is F-Droid compatible
      run: |
        echo "=== Repository Structure ==="
        ls -lah fdroid/repo/
        echo ""
        echo "=== Metadata ==="
        head -20 fdroid/repo/metadata/com.bubo.voidscanner.yml
        echo ""
        echo "=== APK Files ==="
        find fdroid/repo -name "*.apk" -exec ls -lh {} \;