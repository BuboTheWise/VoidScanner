name: F-Droid Build and Update

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'fdroid/**'
      - 'app/build.gradle'
      - 'gradle.properties'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version'
        required: true
        default: '1.1.05'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python for fdroidserver
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    
    - name: Install fdroidserver
      run: pip install fdroidserver
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build release APK
      run: ./gradlew assembleRelease
    
    - name: Copy signed APK to fdroid/repo
      run: |
        VERSION=$(cat gradle.properties)
        APK_NAME=$(echo $VERSION | grep 'APP_VERSION_NAME=' | sed -E 's/.*APP_VERSION_NAME=([^ ]).*/void-scanner-$1.apk/')
        cp app/build/outputs/apk/release/app-release-unsigned.apk fdroid/repo/$APK_NAME
    
    - name: Run fdroid update to generate index
      working-directory: fdroid
      run: fdroid update
    
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git add fdroid/repo/metadata/
        git diff --quiet && git diff --staged --quiet || git commit -m "F-Droid: Update APK and index"
        git push origin main

  verify:
    needs: build-and-update
    runs-on: ubuntu-latest
    steps:
    - name: Verify repository is F-Droid compatible
      run: |
        echo "Repository structure:"
        ls -lah fdroid/repo/
        echo "\nMetadata:"
        head -20 fdroid/repo/metadata/com.bubo.voidscanner.yml
